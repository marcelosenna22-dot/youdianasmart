<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Vídeo Smart</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            margin-bottom: 25px;
        }

        /* Busca Estilo YouTube */
        .search-container {
            width: 100%;
            max-width: 650px;
            position: relative;
            margin-bottom: 30px;
        }

        input { 
            width: 100%; 
            padding: 15px 25px; 
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--card);
            backdrop-filter: blur(10px);
            color: white; 
            outline: none; 
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 71, 87, 0.2); }

        .results-list { 
            position: absolute;
            top: 65px;
            left: 0;
            width: 100%; 
            background: #1e1e2e;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .video-item { 
            padding: 15px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .video-item:hover { background: var(--primary); color: white; }

        /* Player Premium */
        .player-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        video { width: 100%; display: block; }

        /* Controles flutuantes */
        .overlay-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
        }

        .player-container:hover .overlay-controls { opacity: 1; }

        .btn-overlay {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            width: 65px;
            height: 65px;
            font-size: 1.4rem;
            transition: 0.2s;
        }

        .btn-overlay:hover { transform: scale(1.1); background: var(--primary); }

        /* Informações e Ações */
        .video-info {
            width: 100%;
            max-width: 850px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 10px;
        }

        #playingNow { font-size: 1.4rem; margin: 0; font-weight: 600; }
        #countDisplay { font-size: 0.85rem; color: #aaa; margin-top: 5px; }

        .actions { display: flex; gap: 12px; }

        .btn-action {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn-action:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .btn-action.active { color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

    <header><h1>Tube Vídeo Smart</h1></header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar vídeos no seu app..." oninput="searchVideos()" autocomplete="off">
        <div class="results-list" id="resultsList"></div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" controls autoplay>
            <source id="videoSource" src="" type="video/mp4">
        </video>

        <div class="overlay-controls">
            <button class="btn-overlay" onclick="playPrevious()">⏮</button>
            <button class="btn-overlay" onclick="skipTime(-10)">-10s</button>
            <button class="btn-overlay" onclick="skipTime(10)">+10s</button>
            <button class="btn-overlay" onclick="playNext()">⏭</button>
        </div>
    </div>

    <div class="video-info">
        <div>
            <h3 id="playingNow">Selecione um vídeo</h3>
            <p id="countDisplay">0 curtidas • 0 compartilhamentos</p>
        </div>
        <div class="actions">
            <button class="btn-action" id="likeBtn" onclick="registrarCurtida()">
                <span id="likeIcon">🤍</span> <small id="likeCount">0</small>
            </button>
            <button class="btn-action" onclick="registrarCompartilhamento()">
                <span>🔗</span> <small id="shareCount">0</small>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        const videoPlayer = document.getElementById('videoPlayer');
        const resultsList = document.getElementById('resultsList');
        const searchInput = document.getElementById('searchInput');
        const playingNow = document.getElementById('playingNow');
        const countDisplay = document.getElementById('countDisplay');

        let biblioteca = [];
        let currentIndex = -1;

        // Escutando o banco de dados
        onValue(videosRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                
                // Atualiza os contadores na tela se houver um vídeo passando
                if (currentIndex !== -1) {
                    const videoAtualizado = biblioteca.find(v => v.id_firebase === biblioteca[currentIndex].id_firebase);
                    if (videoAtualizado) {
                        atualizarContadoresTela(videoAtualizado);
                    }
                }
            }
        });

        window.carregarVideo = function(index) {
            if (index < 0 || index >= biblioteca.length) return;
            
            currentIndex = index;
            const video = biblioteca[index];
            
            videoPlayer.src = video.arquivo;
            videoPlayer.load();
            videoPlayer.play();
            
            playingNow.innerText = video.titulo;
            atualizarContadoresTela(video);
            
            // Reset visual
            document.getElementById('likeIcon').innerText = "🤍";
            document.getElementById('likeBtn').classList.remove('active');
            resultsList.style.display = 'none';
            searchInput.value = '';
        };

        function atualizarContadoresTela(video) {
            const likes = video.curtidas || 0;
            const shares = video.compartilhamentos || 0;
            document.getElementById('likeCount').innerText = likes;
            document.getElementById('shareCount').innerText = shares;
            countDisplay.innerText = `${likes} curtidas • ${shares} compartilhamentos`;
        }

        // --- FUNÇÕES DE INTERAÇÃO ---

        window.registrarCurtida = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            const videoRef = ref(db, `videos/${videoId}`);

            update(videoRef, { curtidas: increment(1) });
            document.getElementById('likeIcon').innerText = "❤️";
            document.getElementById('likeBtn').classList.add('active');
        };

        window.registrarCompartilhamento = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            const videoRef = ref(db, `videos/${videoId}`);
            const tituloVideo = biblioteca[currentIndex].titulo;

            if (navigator.share) {
                navigator.share({
                    title: 'Tube Vídeo Smart',
                    text: `Assista a "${tituloVideo}" no meu novo app!`,
                    url: window.location.href
                }).then(() => {
                    update(videoRef, { compartilhamentos: increment(1) });
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copiado! Compartilhe no seu navegador.");
                update(videoRef, { compartilhamentos: increment(1) });
            }
        };

        // --- PLAYER E BUSCA ---

        window.skipTime = function(s) { videoPlayer.currentTime += s; };
        window.playNext = function() { carregarVideo((currentIndex + 1) % biblioteca.length); };
        window.playPrevious = function() { carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length); };

        window.searchVideos = function() {
            const termo = searchInput.value.toLowerCase();
            if (termo.length === 0) { resultsList.style.display = 'none'; return; }
            const filtrados = biblioteca.filter(v => v.titulo.toLowerCase().includes(termo));
            if (filtrados.length > 0) { renderLista(filtrados); resultsList.style.display = 'block'; }
            else { resultsList.style.display = 'none'; }
        };

        function renderLista(lista) {
            resultsList.innerHTML = '';
            lista.forEach((video) => {
                const realIndex = biblioteca.findIndex(b => b.id_firebase === video.id_firebase);
                const d = document.createElement('div');
                d.className = 'video-item'; 
                d.innerText = video.titulo;
                d.onclick = () => carregarVideo(realIndex);
                resultsList.appendChild(d);
            });
        }

        document.addEventListener('click', (e) => {
            if (!document.querySelector('.search-container').contains(e.target)) {
                resultsList.style.display = 'none';
            }
        });

        videoPlayer.onended = () => playNext();
    </script>
</body>
</html>
