<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Vídeo Smart</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <style>
        :root { --primary: #ff0000; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container de Busca e Sugestões */
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative; /* Importante para as sugestões flutuarem */
            margin-bottom: 30px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 24px; /* Estilo arredondado do YT */
            border: 1px solid #333; 
            background: var(--card); 
            color: white; 
            outline: none; 
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus { border-color: #444; background: #252525; }

        /* Lista de Sugestões (Dropdown) */
        .results-list { 
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%; 
            background: #212121;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            display: none; /* Escondido por padrão */
        }

        .video-item { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
        }

        .video-item:last-child { border-bottom: none; }

        .video-item:hover { background: #383838; }

        .video-item::before {
            content: "🔍";
            margin-right: 15px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* Player */
        .player-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        video { width: 100%; display: block; z-index: 1; }

        .overlay-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
        }

        .player-container:hover .overlay-controls { opacity: 1; }

        .btn-overlay {
            pointer-events: auto;
            background: rgba(20, 20, 20, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            width: 55px;
            height: 55px;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .btn-overlay:hover { background: var(--primary); transform: scale(1.1); }

        #playingNow { margin-top: 15px; color: #aaa; font-weight: normal; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header><h1 style="color: var(--primary); margin-bottom: 25px;">Tube Vídeo</h1></header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="searchVideos()" autocomplete="off">
        <div class="results-list" id="resultsList"></div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" controls autoplay>
            <source id="videoSource" src="" type="video/mp4">
        </video>

        <div class="overlay-controls">
            <button class="btn-overlay" onclick="playPrevious()">⏮</button>
            <button class="btn-overlay" onclick="skipTime(-10)">-10s</button>
            <button class="btn-overlay" onclick="skipTime(10)">+10s</button>
            <button class="btn-overlay" onclick="playNext()">⏭</button>
        </div>
    </div>

    <h3 id="playingNow">Aguardando seleção...</h3>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
    authDomain: "youvideo-22f8a.firebaseapp.com",
    databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
    projectId: "youvideo-22f8a",
    storageBucket: "youvideo-22f8a.firebasestorage.app",
    messagingSenderId: "179003131728",
    appId: "1:179003131728:web:03874cc5df997f6c724e55",
    measurementId: "G-L1L6NXNVH0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        const videoPlayer = document.getElementById('videoPlayer');
        const resultsList = document.getElementById('resultsList');
        const searchInput = document.getElementById('searchInput');
        const playingNow = document.getElementById('playingNow');

        let biblioteca = [];
        let currentIndex = -1;

        // Carrega dados do Firebase
        onValue(videosRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                biblioteca = Object.keys(data).map(key => ({
                    id_firebase: key,
                    ...data[key]
                }));
            }
        });

        // Funções do Player
        window.carregarVideo = function(index) {
            if (index < 0 || index >= biblioteca.length) return;
            currentIndex = index;
            videoPlayer.src = biblioteca[index].arquivo;
            videoPlayer.load();
            videoPlayer.play();
            playingNow.innerText = biblioteca[index].titulo;
            resultsList.style.display = 'none'; // Fecha sugestões ao clicar
            searchInput.value = ''; // Limpa busca
        };

        window.skipTime = function(s) { videoPlayer.currentTime += s; };
        window.playNext = function() { carregarVideo((currentIndex + 1) % biblioteca.length); };
        window.playPrevious = function() { carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length); };

        // Busca com Sugestões Dinâmicas
        window.searchVideos = function() {
            const termo = searchInput.value.toLowerCase();
            
            if (termo.length === 0) {
                resultsList.style.display = 'none';
                return;
            }

            const filtrados = biblioteca.filter(v => v.titulo.toLowerCase().includes(termo));

            if (filtrados.length > 0) {
                renderLista(filtrados);
                resultsList.style.display = 'block';
            } else {
                resultsList.style.display = 'none';
            }
        };

        function renderLista(lista) {
            resultsList.innerHTML = '';
            lista.forEach((video) => {
                const realIndex = biblioteca.findIndex(b => b.titulo === video.titulo);
                const d = document.createElement('div');
                d.className = 'video-item'; 
                d.innerText = video.titulo;
                d.onclick = () => carregarVideo(realIndex);
                resultsList.appendChild(d);
            });
        }

        // Fechar sugestões ao clicar fora
        document.addEventListener('click', (e) => {
            if (!document.querySelector('.search-container').contains(e.target)) {
                resultsList.style.display = 'none';
            }
        });

        videoPlayer.onended = () => playNext();
    </script>
</body>
</html>
