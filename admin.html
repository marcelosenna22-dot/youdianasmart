<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - YouVideo Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-login { background-color: #3498db; color: white; }
        .btn-save { background-color: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-delete { background-color: #ff4757; color: white; width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .btn-logout { background-color: #8e44ad; color: white; margin-top: 20px; font-size: 0.8rem; }
        
        /* Esconde o painel até logar */
        #painelAdmin { display: none; }
        .video-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="container" id="telaLogin">
        <h2>🔒 Área Restrita</h2>
        <input type="email" id="emailAdmin" placeholder="E-mail do administrador">
        <input type="password" id="senhaAdmin" placeholder="Sua senha">
        <button class="btn-login" onclick="fazerLogin()">Entrar no Painel</button>
    </div>

    <div class="container" id="painelAdmin">
        <h2>🚀 YouVideo Admin</h2>
        <p id="userLogado" style="font-size: 0.8rem; color: #666; text-align: center;"></p>
        
        <label>Título do Vídeo:</label>
        <input type="text" id="titulo" placeholder="Ex: Clipe Novo">
        <label>Caminho do Arquivo:</label>
        <input type="text" id="caminho" placeholder="Ex: videos/clipe.mp4">
        <button class="btn-save" onclick="salvarVideo()">💾 Salvar Vídeo</button>

        <hr>
        <div id="listaVideos"></div>

        <button class="btn-logout" onclick="fazerLogout()">Sair com segurança</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        // --- SISTEMA DE LOGIN ---
        window.fazerLogin = function() {
            const email = document.getElementById('emailAdmin').value;
            const senha = document.getElementById('senhaAdmin').value;
            signInWithEmailAndPassword(auth, email, senha)
                .catch(error => alert("Erro ao entrar: Verifique e-mail e senha."));
        };

        window.fazerLogout = function() {
            signOut(auth).then(() => location.reload());
        };

        // Monitorar se o usuário está logado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                document.getElementById('painelAdmin').style.display = 'block';
                document.getElementById('userLogado').innerText = "Logado como: " + user.email;
                carregarLista();
            } else {
                document.getElementById('telaLogin').style.display = 'block';
                document.getElementById('painelAdmin').style.display = 'none';
            }
        });

        // --- FUNÇÕES DO BANCO DE DADOS ---
        window.salvarVideo = function() {
            const titulo = document.getElementById('titulo').value;
            const arquivo = document.getElementById('caminho').value;
            if (titulo && arquivo) {
                push(videosRef, { titulo, arquivo, curtidas: 0, compartilhamentos: 0 });
                document.getElementById('titulo').value = "";
                document.getElementById('caminho').value = "";
            }
        };

        window.excluirVideo = function(id) {
            if (confirm("Excluir este vídeo?")) remove(ref(db, `videos/${id}`));
        };

        function carregarLista() {
            onValue(videosRef, (snapshot) => {
                const listaDiv = document.getElementById('listaVideos');
                listaDiv.innerHTML = "<h4>Vídeos Online:</h4>";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        const v = data[key];
                        listaDiv.innerHTML += `
                            <div class="video-item">
                                <span>${v.titulo}</span>
                                <button class="btn-delete" onclick="excluirVideo('${key}')">Remover</button>
                            </div>`;
                    });
                }
            });
        }
    </script>
</body>
</html>
