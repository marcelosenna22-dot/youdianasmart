<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Master - YouVideo Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; position: relative; }
        h2 { text-align: center; color: #333; margin-top: 10px; }
        
        /* --- BOTÃO SAIR NO TOPO DIREITO --- */
        .btn-logout { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: #f1f2f6; 
            color: #ff4757; 
            border: none; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4757; color: white; }

        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #666; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 80px; resize: vertical; }
        
        button { padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; }
        
        .btn-login { background-color: #3498db; color: white; }
        .btn-save { background-color: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-update { background-color: #f39c12; color: white; margin-bottom: 10px; display: none; }
        .btn-cancel { background-color: #bdc3c7; color: white; margin-bottom: 10px; display: none; }
        
        .video-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 8px; border-radius: 8px; border: 1px solid #f0f0f0; }
        .info { flex-grow: 1; overflow: hidden; margin-right: 10px; }
        .info b { display: block; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info span { font-size: 0.7rem; color: #888; display: block; }
        
        .actions-list { display: flex; gap: 5px; }
        .btn-edit { background-color: #f1f2f6; color: #f39c12; font-size: 0.7rem; padding: 6px 10px; width: auto; }
        .btn-delete { background-color: #f1f2f6; color: #ff4757; font-size: 0.7rem; padding: 6px 10px; width: auto; }
        
        #painelAdmin { display: none; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        .status-user { text-align: center; font-size: 0.7rem; color: #999; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container" id="telaLogin">
        <h2>🔒 Área Restrita</h2>
        <input type="email" id="emailAdmin" placeholder="E-mail do administrador">
        <input type="password" id="senhaAdmin" placeholder="Senha">
        <button class="btn-login" onclick="fazerLogin()">Aceder ao Painel</button>
    </div>

    <div class="container" id="painelAdmin">
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
        
        <h2>🚀 YouVideo Admin</h2>
        <div id="userEmail" class="status-user"></div>
        
        <input type="hidden" id="editId">
        
        <label>Título do Vídeo:</label>
        <input type="text" id="titulo" placeholder="Ex: Aula de JavaScript">
        
        <label>Descrição do Vídeo:</label>
        <textarea id="descricao" placeholder="Escreva os detalhes que aparecerão abaixo do vídeo..."></textarea>
        
        <label>Caminho do Arquivo (GitHub):</label>
        <input type="text" id="caminho" placeholder="Ex: videos/aula1.mp4">
        
        <button id="btnSalvar" class="btn-save" onclick="salvarVideo()">💾 Cadastrar Vídeo</button>
        <button id="btnAtualizar" class="btn-update" onclick="atualizarVideo()">🔄 Guardar Alterações</button>
        <button id="btnCancelar" class="btn-cancel" onclick="cancelarEdicao()">Cancelar Edição</button>

        <hr>
        <div id="listaVideos">Carregando vídeos...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        window.fazerLogin = () => {
            const email = document.getElementById('emailAdmin').value;
            const senha = document.getElementById('senhaAdmin').value;
            signInWithEmailAndPassword(auth, email, senha).catch(() => alert("Acesso negado!"));
        };

        window.fazerLogout = () => {
            if(confirm("Deseja realmente sair?")) signOut(auth).then(() => location.reload());
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                document.getElementById('painelAdmin').style.display = 'block';
                document.getElementById('userEmail').innerText = "Conectado: " + user.email;
                carregarLista();
            } else {
                document.getElementById('telaLogin').style.display = 'block';
                document.getElementById('painelAdmin').style.display = 'none';
            }
        });

        window.salvarVideo = () => {
            const titulo = document.getElementById('titulo').value;
            const descricao = document.getElementById('descricao').value;
            const arquivo = document.getElementById('caminho').value;
            if (titulo && arquivo) {
                push(videosRef, { titulo, descricao, arquivo, curtidas: 0, compartilhamentos: 0 }).then(() => limparCampos());
            }
        };

        window.prepararEdicao = (id, titulo, desc, arquivo) => {
            document.getElementById('editId').value = id;
            document.getElementById('titulo').value = titulo;
            document.getElementById('descricao').value = desc === "undefined" ? "" : desc;
            document.getElementById('caminho').value = arquivo;
            document.getElementById('btnSalvar').style.display = 'none';
            document.getElementById('btnAtualizar').style.display = 'block';
            document.getElementById('btnCancelar').style.display = 'block';
            window.scrollTo(0, 0);
        };

        window.atualizarVideo = () => {
            const id = document.getElementById('editId').value;
            const titulo = document.getElementById('titulo').value;
            const descricao = document.getElementById('descricao').value;
            const arquivo = document.getElementById('caminho').value;
            if (id && titulo && arquivo) {
                update(ref(db, `videos/${id}`), { titulo, descricao, arquivo }).then(() => cancelarEdicao());
            }
        };

        window.cancelarEdicao = () => {
            limparCampos();
            document.getElementById('btnSalvar').style.display = 'block';
            document.getElementById('btnAtualizar').style.display = 'none';
            document.getElementById('btnCancelar').style.display = 'none';
        };

        window.excluirVideo = (id) => {
            if (confirm("Apagar permanentemente?")) remove(ref(db, `videos/${id}`));
        };

        function limparCampos() {
            document.getElementById('titulo').value = "";
            document.getElementById('descricao').value = "";
            document.getElementById('caminho').value = "";
            document.getElementById('editId').value = "";
        }

        function carregarLista() {
            onValue(videosRef, (snapshot) => {
                const listaDiv = document.getElementById('listaVideos');
                listaDiv.innerHTML = "<h4>Vídeos Online:</h4>";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        const v = data[key];
                        const item = document.createElement('div');
                        item.className = 'video-item';
                        const descSegura = (v.descricao || "").replace(/'/g, "\\'");
                        const tituloSeguro = (v.titulo || "").replace(/'/g, "\\'");
                        item.innerHTML = `
                            <div class="info"><b>${v.titulo}</b><span>${v.arquivo}</span></div>
                            <div class="actions-list">
                                <button class="btn-edit" onclick="prepararEdicao('${key}', '${tituloSeguro}', '${descSegura}', '${v.arquivo}')">Editar</button>
                                <button class="btn-delete" onclick="excluirVideo('${key}')">X</button>
                            </div>`;
                        listaDiv.appendChild(item);
                    });
                }
            });
        }
    </script>
</body>
</html>
